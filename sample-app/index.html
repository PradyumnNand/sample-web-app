<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      width: 100%;
      max-width: 540px;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #111827;
      margin-bottom: 24px;
      letter-spacing: -0.3px;
    }

    .add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .add-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #111827;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }

    .add-row input:focus { border-color: #6366f1; }

    .add-row button {
      padding: 10px 18px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .add-row button:hover { background: #4f46e5; }

    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .filter-btn {
      padding: 5px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 20px;
      background: #fff;
      color: #6b7280;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn.active {
      border-color: #6366f1;
      background: #6366f1;
      color: #fff;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px 14px;
      transition: border-color 0.15s, opacity 0.15s;
    }

    .task-item.done { opacity: 0.55; }

    .task-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #6366f1;
      cursor: pointer;
      flex-shrink: 0;
    }

    .task-text {
      flex: 1;
      font-size: 0.95rem;
      color: #111827;
      word-break: break-word;
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .tag {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 12px;
      flex-shrink: 0;
    }

    .tag-work   { background: #dbeafe; color: #1d4ed8; }
    .tag-personal { background: #dcfce7; color: #15803d; }
    .tag-urgent { background: #fee2e2; color: #b91c1c; }

    .delete-btn {
      background: none;
      border: none;
      color: #d1d5db;
      font-size: 1.1rem;
      cursor: pointer;
      line-height: 1;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: #ef4444; }

    .empty {
      text-align: center;
      color: #9ca3af;
      font-size: 0.9rem;
      padding: 40px 0;
    }

    .footer {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      color: #9ca3af;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #9ca3af;
      font-size: 0.8rem;
      cursor: pointer;
      text-decoration: underline;
      padding: 0;
    }

    .clear-btn:hover { color: #ef4444; }
  </style>
</head>
<body>
<div class="container">
  <h1>Task Manager</h1>

  <div class="add-row">
    <input id="task-input" type="text" placeholder="Add a new task…" maxlength="120" />
    <button onclick="addTask()">Add</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all"   onclick="setFilter('all')">All</button>
    <button class="filter-btn"        data-filter="active" onclick="setFilter('active')">Active</button>
    <button class="filter-btn"        data-filter="done"   onclick="setFilter('done')">Done</button>
  </div>

  <div id="task-list" class="task-list"></div>

  <div class="footer">
    <span id="task-count"></span>
    <button class="clear-btn" onclick="clearDone()">Clear completed</button>
  </div>
</div>

<script>
  const TAGS = ['work', 'personal', 'urgent'];

  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  let filter = 'all';

  function save() {
    localStorage.setItem('tasks', JSON.stringify(tasks));
  }

  function randomTag() {
    return TAGS[Math.floor(Math.random() * TAGS.length)];
  }

  function addTask() {
    const input = document.getElementById('task-input');
    const text = input.value.trim();
    if (!text) { input.focus(); return; }

    tasks.unshift({ id: Date.now(), text, done: false, tag: randomTag() });
    input.value = '';
    save();
    render();
    input.focus();
  }

  function toggleDone(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
    render();
  }

  function clearDone() {
    tasks = tasks.filter(t => !t.done);
    save();
    render();
  }

  function setFilter(f) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.filter === f);
    });
    render();
  }

  function render() {
    const visible = tasks.filter(t => {
      if (filter === 'active') return !t.done;
      if (filter === 'done')   return t.done;
      return true;
    });

    const list = document.getElementById('task-list');
    const remaining = tasks.filter(t => !t.done).length;
    document.getElementById('task-count').textContent =
      `${remaining} task${remaining !== 1 ? 's' : ''} remaining`;

    if (visible.length === 0) {
      list.innerHTML = '<p class="empty">No tasks here.</p>';
      return;
    }

    list.innerHTML = visible.map(t => `
      <div class="task-item ${t.done ? 'done' : ''}">
        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleDone(${t.id})" />
        <span class="task-text">${escHtml(t.text)}</span>
        <span class="tag tag-${t.tag}">${t.tag}</span>
        <button class="delete-btn" onclick="deleteTask(${t.id})" title="Delete">×</button>
      </div>
    `).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  render();
</script>
</body>
</html>
